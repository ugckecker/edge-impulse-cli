<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Horizont</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --surface:   #12121a;
    --border:    #1e1e2e;
    --accent:    #6c9ef8;
    --text:      #d4d4e8;
    --muted:     #5a5a7a;
    --dramatic-bg:      #1a0505;
    --dramatic-border:  #4a0a0a;
    --dramatic-accent:  #c94040;
    --dramatic-glow:    rgba(180, 20, 20, 0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: background 1.2s ease;
  }

  body.dramatic {
    background: var(--dramatic-bg);
  }

  .glow-overlay {
    pointer-events: none;
    position: fixed;
    inset: 0;
    opacity: 0;
    background: radial-gradient(ellipse at center, var(--dramatic-glow) 0%, transparent 70%);
    transition: opacity 1.4s ease;
    z-index: 0;
  }
  body.dramatic .glow-overlay { opacity: 1; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    text-align: center;
    margin-bottom: 2.8rem;
  }

  .station-name {
    font-size: 1rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
    transition: color 1.2s;
  }
  body.dramatic .station-name { color: var(--dramatic-accent); }

  .tagline {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem 2.2rem;
    transition: border-color 1.2s, background 1.2s;
  }
  body.dramatic .card {
    background: #160808;
    border-color: var(--dramatic-border);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.6rem;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .dot.live   { background: #4caf83; animation: pulse 2s infinite; }
  .dot.loading { background: #c0a040; animation: pulse 1s infinite; }
  .dot.dramatic { background: var(--dramatic-accent); animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .status-text {
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .title {
    font-size: 1.45rem;
    line-height: 1.35;
    color: var(--accent);
    margin-bottom: 1.4rem;
    min-height: 2.8rem;
    transition: color 1.2s;
  }
  body.dramatic .title { color: #e87070; }

  .transcript {
    font-size: 0.95rem;
    line-height: 1.75;
    color: var(--text);
    opacity: 0.82;
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .audio-wrapper {
    margin-top: 1.8rem;
  }

  audio {
    width: 100%;
    height: 36px;
    border-radius: 6px;
    outline: none;
    filter: invert(0.85) hue-rotate(200deg);
  }
  body.dramatic audio { filter: invert(0.85) hue-rotate(330deg); }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-top: 0.8rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    border-radius: 3px;
    transition: width 0.5s linear, background 1.2s;
  }
  body.dramatic .progress-bar { background: var(--dramatic-accent); }

  footer {
    margin-top: 1.8rem;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    opacity: 0.45;
    letter-spacing: 0.1em;
  }

  #queue-indicator {
    font-size: 0.65rem;
    color: var(--muted);
    opacity: 0.5;
    text-align: right;
    margin-top: 0.6rem;
  }
</style>
</head>
<body>
<div class="glow-overlay"></div>
<div class="container">
  <header>
    <div class="station-name">Radio Horizont</div>
    <div class="tagline">Science &middot; History &middot; Curiosity</div>
  </header>

  <div class="card">
    <div class="status-bar">
      <div class="dot loading" id="dot"></div>
      <div class="status-text" id="status-text">Preparing broadcast…</div>
    </div>

    <div class="title" id="title">—</div>
    <div class="transcript" id="transcript"></div>

    <div class="audio-wrapper">
      <audio id="player" controls></audio>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="queue-indicator"></div>
  </div>

  <footer>Fully automated AI radio &nbsp;·&nbsp; No humans were harmed in this broadcast</footer>
</div>

<script>
(function () {
  'use strict';

  const player       = document.getElementById('player');
  const titleEl      = document.getElementById('title');
  const transcriptEl = document.getElementById('transcript');
  const statusText   = document.getElementById('status-text');
  const dotEl        = document.getElementById('dot');
  const progressBar  = document.getElementById('progress-bar');
  const queueEl      = document.getElementById('queue-indicator');

  // ── Dramatic ambience (Web Audio API) ───────────────────────────────────
  let audioCtx = null;
  let droneOsc = null;
  let droneGain = null;

  function startDrone() {
    if (droneOsc) return;
    if (!audioCtx) audioCtx = new AudioContext();
    droneOsc  = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55; // A1 — low, ominous
    droneGain.gain.setValueAtTime(0, audioCtx.currentTime);
    droneGain.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 2.5);
    droneOsc.connect(droneGain);
    droneGain.connect(audioCtx.destination);
    droneOsc.start();
  }

  function stopDrone() {
    if (!droneOsc) return;
    droneGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.5);
    const osc = droneOsc;
    setTimeout(() => { try { osc.stop(); } catch(_){} }, 3000);
    droneOsc  = null;
    droneGain = null;
  }

  function applyDramatic(on) {
    if (on) {
      document.body.classList.add('dramatic');
      dotEl.className = 'dot dramatic';
      startDrone();
    } else {
      document.body.classList.remove('dramatic');
      dotEl.className = 'dot live';
      stopDrone();
    }
  }

  // ── Progress bar ─────────────────────────────────────────────────────────
  player.addEventListener('timeupdate', () => {
    if (!player.duration) return;
    progressBar.style.width = (player.currentTime / player.duration * 100) + '%';
  });

  // ── Load next segment ────────────────────────────────────────────────────
  let fetching = false;

  async function loadNext() {
    if (fetching) return;
    fetching = true;

    setStatus('loading', 'Preparing next segment…');
    titleEl.textContent = '—';
    transcriptEl.textContent = '';
    progressBar.style.width = '0%';

    try {
      const res  = await fetch('/api/next');
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();

      titleEl.textContent      = data.title || '';
      transcriptEl.textContent = data.text  || '';

      applyDramatic(Boolean(data.dramatic));

      player.src = '/audio/' + data.audioFile;
      player.load();

      setStatus('live', data.dramatic ? 'On Air — Dramatic' : 'On Air');

      await player.play().catch(() => {
        // Autoplay blocked — user must click play manually
        setStatus('live', 'Press play to listen');
      });

      pollQueueStatus();

    } catch (err) {
      console.error('loadNext error:', err);
      setStatus('loading', 'Retrying in 10 seconds…');
      setTimeout(loadNext, 10000);
    } finally {
      fetching = false;
    }
  }

  player.addEventListener('ended', () => {
    applyDramatic(false);
    loadNext();
  });

  player.addEventListener('error', () => {
    setStatus('loading', 'Audio error — retrying…');
    setTimeout(loadNext, 5000);
  });

  function setStatus(state, text) {
    statusText.textContent = text;
    if (state === 'loading') {
      dotEl.className = 'dot loading';
    } else if (state === 'live') {
      dotEl.className = 'dot live';
    }
  }

  async function pollQueueStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();
      queueEl.textContent = `${data.queueLength} segment${data.queueLength !== 1 ? 's' : ''} queued`;
    } catch (_) { queueEl.textContent = ''; }
    setTimeout(pollQueueStatus, 8000);
  }

  // Boot
  loadNext();
})();
</script>
</body>
</html>
